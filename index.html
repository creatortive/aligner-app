<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F1B2D">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Aligner Hours">
<title>Aligner Hours</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0F1B2D; --card: #152236; --card2: #1A2E47;
    --mint: #3ECFB2; --amber: #F5A623; --red: #EF6C6C;
    --text: #F0F4FF; --muted: #8FA3BF; --dim: #4A6580; --dimmer: #2A4060;
    --border: #2A4060;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
  body { padding: 24px 16px 80px; max-width: 480px; margin: 0 auto; }

  .eyebrow { text-align: center; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim); margin-bottom: 4px; }
  h1 { text-align: center; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 24px; }

  .card { background: var(--card); border-radius: 20px; padding: 24px 20px; margin-bottom: 16px; box-shadow: 0 4px 32px rgba(0,0,0,0.4); }

  /* Set badge */
  .set-row { display: flex; justify-content: center; margin-bottom: 20px; }
  .set-badge { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .set-name { color: var(--mint); font-weight: 600; }
  .set-edit-btn { background: none; border: 1px solid var(--border); color: var(--dim); border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; letter-spacing: 1px; font-family: inherit; }
  .set-edit-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .set-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 7px 12px; font-size: 13px; font-family: inherit; width: 160px; outline: none; }
  .btn-save { background: var(--mint); color: var(--bg); border: none; border-radius: 8px; padding: 7px 14px; font-weight: 700; font-size: 12px; cursor: pointer; font-family: inherit; }
  .btn-cancel { background: none; color: var(--dim); border: 1px solid var(--border); border-radius: 8px; padding: 7px 14px; font-size: 12px; cursor: pointer; font-family: inherit; }

  /* Ring */
  .ring-wrap { position: relative; width: 220px; height: 220px; margin: 0 auto; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-inner { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; pointer-events: none; }
  .ring-day { font-size: 11px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; }
  .ring-time { font-family: 'DM Mono', monospace; font-size: 34px; font-weight: 500; letter-spacing: 2px; line-height: 1; transition: color 0.3s; }
  .ring-status { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; transition: color 0.3s; }

  /* Buttons */
  .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
  .ctrl-btn { flex: 1; max-width: 110px; padding: 14px 0; border-radius: 12px; border: none; font-family: inherit; font-weight: 700; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
  .ctrl-btn:disabled { opacity: 0.32; cursor: not-allowed; }
  .ctrl-btn:active:not(:disabled) { transform: scale(0.95); }
  .btn-start { background: var(--mint); color: var(--bg); }
  .btn-pause { background: var(--amber); color: var(--bg); }
  .btn-stop  { background: var(--red);  color: var(--bg); }
  .hint-row { display: flex; gap: 10px; justify-content: center; margin-top: 8px; }
  .hint { flex: 1; max-width: 110px; text-align: center; font-size: 10px; color: var(--dimmer); letter-spacing: 0.3px; }
  .next-day-hint { text-align: center; font-size: 12px; color: var(--dim); margin-top: 10px; }
  .next-day-hint span { color: var(--mint); font-weight: 600; }

  /* Log */
  .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); }
  .export-btn { display: flex; align-items: center; gap: 6px; background: var(--card2); border: 1px solid var(--border); color: var(--mint); border-radius: 8px; padding: 7px 14px; font-size: 12px; font-family: inherit; font-weight: 600; cursor: pointer; letter-spacing: 0.5px; transition: background 0.2s; }
  .export-btn:hover { background: #233D5C; }
  .empty { text-align: center; color: var(--dimmer); padding: 32px 0; font-size: 13px; line-height: 1.8; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 8px; color: var(--dim); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--card2); font-weight: 600; }
  td { padding: 9px 8px; color: #C8D8F0; border-bottom: 1px solid #1A2E47; }
  .td-mono { font-family: 'DM Mono', monospace; color: #8ECFD4; }
  .td-set { color: var(--dim); font-size: 12px; }
  .day-header td { padding: 14px 8px 6px; color: var(--muted); font-weight: 600; font-size: 12px; background: none; border-bottom: none; }
  .day-pill { border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-right: 6px; border: 1px solid var(--border); background: var(--card2); color: var(--muted); }
  .day-pill.active { background: rgba(62,207,178,0.15); color: var(--mint); border-color: rgba(62,207,178,0.3); }
  .total-row { background: var(--card2); }
  .total-row td { color: var(--mint); font-family: 'DM Mono', monospace; font-weight: 700; }
  .total-label { color: var(--dim) !important; font-size: 11px !important; letter-spacing: 1px; text-transform: uppercase; font-family: inherit !important; font-weight: 400 !important; }
  .total-hrs { font-family: inherit; font-size: 11px; color: var(--dim); font-weight: 400; margin-left: 8px; }
  .del-btn { background: none; border: none; color: var(--dimmer); cursor: pointer; font-size: 15px; padding: 2px 4px; line-height: 1; -webkit-tap-highlight-color: transparent; }
  .del-btn:active { color: var(--red); }

  /* Edit day modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; padding: 24px; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border-radius: 16px; padding: 24px 20px; width: 100%; max-width: 320px; box-shadow: 0 8px 40px rgba(0,0,0,0.6); }
  .modal h3 { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
  .modal-field input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit; outline: none; }
  .modal-field input:focus { border-color: var(--mint); }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .modal-btns button { flex: 1; padding: 11px 0; border-radius: 10px; border: none; font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; }
  .modal-save { background: var(--mint); color: var(--bg); }
  .modal-cancel { background: var(--card2); color: var(--muted); }
  .edit-day-btn { background: none; border: none; color: var(--dimmer); cursor: pointer; font-size: 13px; padding: 2px 5px; margin-left: 4px; vertical-align: middle; -webkit-tap-highlight-color: transparent; }
  .edit-day-btn:active { color: var(--mint); }

  /* Install banner */
  #install-banner { display: none; background: var(--card2); border: 1px solid rgba(62,207,178,0.25); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; }
  #install-banner.show { display: flex; align-items: center; gap: 12px; }
  #install-banner p { font-size: 12px; color: var(--muted); flex: 1; line-height: 1.5; }
  #install-banner p strong { color: var(--mint); }
  #install-btn { background: var(--mint); color: var(--bg); border: none; border-radius: 8px; padding: 8px 14px; font-weight: 700; font-size: 12px; cursor: pointer; font-family: inherit; white-space: nowrap; }
  #dismiss-btn { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 18px; padding: 0 2px; }
</style>
</head>
<body>

<div class="eyebrow">Orthodontic Compliance</div>
<h1>Aligner Hours</h1>

<!-- Install banner (shown when PWA installable) -->
<div id="install-banner">
  <p><strong>Install as app</strong><br>Add to your home screen for easy access</p>
  <button id="install-btn">Install</button>
  <button id="dismiss-btn">✕</button>
</div>

<!-- Timer card -->
<div class="card" id="timer-card">
  <div class="set-row" id="set-row">
    <div class="set-badge" id="set-badge">
      <span style="color:var(--dim)">Current aligner:</span>
      <span class="set-name" id="set-name-display">Set 1</span>
      <button class="set-edit-btn" onclick="startEditSet()">Change</button>
    </div>
    <div class="set-edit-row" id="set-edit-row" style="display:none">
      <input class="set-input" id="set-input" placeholder="e.g. Set 4, Week 2…" maxlength="30">
      <button class="btn-save" onclick="saveSet()">Save</button>
      <button class="btn-cancel" onclick="cancelEditSet()">Cancel</button>
    </div>
  </div>

  <!-- Ring SVG -->
  <div class="ring-wrap">
    <svg width="220" height="220" id="ring-svg">
      <circle cx="110" cy="110" r="88" fill="none" stroke="#1A2E47" stroke-width="10"/>
      <circle id="ring-arc" cx="110" cy="110" r="88" fill="none"
        stroke="#2A3F5F" stroke-width="10"
        stroke-dasharray="552.92" stroke-dashoffset="552.92"
        stroke-linecap="round"
        style="transition: stroke-dashoffset 1s linear, stroke 0.3s"/>
    </svg>
    <div class="ring-inner">
      <div class="ring-day" id="ring-day" style="display:none">Day 1</div>
      <div class="ring-time" id="ring-time" style="color:var(--muted)">00:00:00</div>
      <div class="ring-status" id="ring-status" style="color:var(--dim)">Ready</div>
    </div>
  </div>

  <div class="next-day-hint" id="next-day-hint" style="display:none">
    Press <span>Start</span> to begin Day <span id="next-day-num">2</span>
  </div>

  <div class="btn-row">
    <button class="ctrl-btn btn-start" id="btn-start" onclick="handleStart()">Start</button>
    <button class="ctrl-btn btn-pause" id="btn-pause" onclick="handlePause()" disabled>Pause</button>
    <button class="ctrl-btn btn-stop"  id="btn-stop"  onclick="handleStop()"  disabled>Stop</button>
  </div>
  <div class="hint-row">
    <span class="hint" id="hint-start">new day</span>
    <span class="hint">stay in day</span>
    <span class="hint">finish day</span>
  </div>
</div>

<!-- Log card -->
<div class="card">
  <div class="log-header">
    <div class="section-label">Wear Log</div>
    <button class="export-btn" id="export-btn" onclick="exportExcel()" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Export Excel
    </button>
  </div>
  <div id="log-container">
    <div class="empty">No sessions recorded yet.<br>Press Start to begin Day 1!</div>
  </div>
</div>

<!-- Edit Day Modal -->
<div class="modal-overlay" id="edit-day-modal">
  <div class="modal">
    <h3>Edit Day</h3>
    <div class="modal-field">
      <label>Day Number</label>
      <input type="number" id="edit-day-num" min="1" max="999" placeholder="e.g. 3">
    </div>
    <div class="modal-field">
      <label>Date</label>
      <input type="date" id="edit-day-date">
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeEditDay()">Cancel</button>
      <button class="modal-save" onclick="saveEditDay()">Save</button>
    </div>
  </div>
</div>

<!-- SheetJS for Excel export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ─── State ───────────────────────────────────────────────────────────────────
const CIRC = 2 * Math.PI * 88; // 552.92

let state = {
  alignerSet: 'Set 1',
  currentDay: 0,
  currentDayDate: null,
  isRunning: false,
  isPaused: false,
  sessionStartMs: null,   // ms timestamp when current segment started
  elapsed: 0,             // seconds accumulated in the *live* segment
  log: []                 // [{dayNum, date, startTime, endTime, seconds, set}]
};

// ─── Persistence ─────────────────────────────────────────────────────────────
function save() {
  try { localStorage.setItem('aligner_v2', JSON.stringify(state)); } catch(e) {}
}

function load() {
  try {
    const raw = localStorage.getItem('aligner_v2');
    if (raw) {
      const saved = JSON.parse(raw);
      state = { ...state, ...saved };
      // If app was closed while running, compute elapsed from saved sessionStartMs
      if (state.isRunning && !state.isPaused && state.sessionStartMs) {
        const gone = Math.floor((Date.now() - state.sessionStartMs) / 1000);
        state.elapsed = (state.elapsed || 0) + gone;
        // Update sessionStartMs to now so tick works correctly
        state.sessionStartMs = Date.now();
      }
      // If closed while paused, elapsed is already saved (it's the paused-at value which we reset to 0 on pause)
    }
  } catch(e) {}
}

// ─── Timer tick ───────────────────────────────────────────────────────────────
let tickInterval = null;

function startTick() {
  if (tickInterval) return;
  tickInterval = setInterval(() => {
    state.elapsed++;
    // Save sessionStartMs periodically so recovery is accurate
    save();
    updateUI();
  }, 1000);
}

function stopTick() {
  clearInterval(tickInterval);
  tickInterval = null;
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function fmtDuration(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  return `${pad(h)}:${pad(m)}:${pad(sec)}`;
}
function pad(n) { return String(n).padStart(2, '0'); }
function nowDateStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function fmtDate(str) {
  const [y,m,d] = str.split('-');
  return new Date(y, m-1, d).toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', year:'numeric'});
}
function fmtTime(ms) {
  return new Date(ms).toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
}

// ─── Actions ─────────────────────────────────────────────────────────────────
function handleStart() {
  const now = Date.now();
  state.currentDay++;
  state.currentDayDate = nowDateStr();
  state.sessionStartMs = now;
  state.elapsed = 0;
  state.isRunning = true;
  state.isPaused = false;
  save();
  startTick();
  updateUI();
}

function handleResume() {
  state.sessionStartMs = Date.now();
  state.isPaused = false;
  save();
  startTick();
  updateUI();
}

function handlePause() {
  if (!state.isRunning || state.isPaused) return;
  stopTick();
  const now = Date.now();
  recordSegment(state.sessionStartMs, now, state.elapsed);
  state.isPaused = true;
  state.elapsed = 0;
  state.sessionStartMs = null;
  save();
  updateUI();
}

function handleStop() {
  if (!state.isRunning) return;
  stopTick();
  const now = Date.now();
  if (!state.isPaused) {
    recordSegment(state.sessionStartMs, now, state.elapsed);
  }
  state.isRunning = false;
  state.isPaused = false;
  state.elapsed = 0;
  state.sessionStartMs = null;
  save();
  updateUI();
}

function recordSegment(startMs, endMs, seconds) {
  if (seconds < 1) return;
  state.log.push({
    dayNum: state.currentDay,
    date: state.currentDayDate,
    startTime: fmtTime(startMs),
    endTime: fmtTime(endMs),
    seconds,
    set: state.alignerSet
  });
}

// ─── Edit day ─────────────────────────────────────────────────────────────────
let editingDayNum = null; // the dayNum currently being edited

function openEditDay(dayNum) {
  editingDayNum = dayNum;
  const entries = state.log.filter(e => e.dayNum === dayNum);
  document.getElementById('edit-day-num').value = dayNum;
  document.getElementById('edit-day-date').value = entries[0]?.date || '';
  document.getElementById('edit-day-modal').classList.add('show');
}

function closeEditDay() {
  document.getElementById('edit-day-modal').classList.remove('show');
  editingDayNum = null;
}

function saveEditDay() {
  const newDayNum = parseInt(document.getElementById('edit-day-num').value, 10);
  const newDate = document.getElementById('edit-day-date').value;
  if (!newDayNum || newDayNum < 1) return;

  // Check for collision with another day (not the one being edited)
  const collision = state.log.some(e => e.dayNum === newDayNum && e.dayNum !== editingDayNum);
  if (collision) {
    alert(`Day ${newDayNum} already exists. Please choose a different number.`);
    return;
  }

  state.log = state.log.map(e => {
    if (e.dayNum === editingDayNum) {
      return { ...e, dayNum: newDayNum, date: newDate || e.date };
    }
    return e;
  });

  // If we renamed the currently active day, update currentDay too
  if (state.currentDay === editingDayNum) {
    state.currentDay = newDayNum;
    if (newDate) state.currentDayDate = newDate;
  }

  closeEditDay();
  save();
  updateUI();
}

// Close modal on overlay click
document.getElementById('edit-day-modal').addEventListener('click', function(e) {
  if (e.target === this) closeEditDay();
});

// ─── Set management ───────────────────────────────────────────────────────────
function startEditSet() {
  document.getElementById('set-badge').style.display = 'none';
  document.getElementById('set-edit-row').style.display = 'flex';
  const inp = document.getElementById('set-input');
  inp.value = state.alignerSet;
  inp.focus();
}
function saveSet() {
  const v = document.getElementById('set-input').value.trim();
  state.alignerSet = v || 'Set 1';
  cancelEditSet();
  save();
  updateSetDisplay();
}
function cancelEditSet() {
  document.getElementById('set-badge').style.display = 'flex';
  document.getElementById('set-edit-row').style.display = 'none';
}
document.getElementById('set-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveSet();
  if (e.key === 'Escape') cancelEditSet();
});
function updateSetDisplay() {
  document.getElementById('set-name-display').textContent = state.alignerSet;
}

// ─── Excel export ─────────────────────────────────────────────────────────────
function exportExcel() {
  const wb = XLSX.utils.book_new();

  // Sessions sheet
  const rows1 = [['Day','Date','Start','End','Duration (hh:mm:ss)','Hours','Aligner Set']];
  state.log.forEach(e => {
    rows1.push([
      `Day ${e.dayNum}`, fmtDate(e.date), e.startTime, e.endTime,
      fmtDuration(e.seconds),
      Math.round(e.seconds / 3600 * 100) / 100,
      e.set
    ]);
  });
  const ws1 = XLSX.utils.aoa_to_sheet(rows1);
  ws1['!cols'] = [{wch:8},{wch:24},{wch:10},{wch:10},{wch:20},{wch:8},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Sessions');

  // Summary sheet
  const grouped = groupByDay();
  const rows2 = [['Day','Date','Total (hh:mm:ss)','Total Hours','Aligner Sets']];
  Object.keys(grouped).map(Number).sort((a,b)=>a-b).forEach(d => {
    const entries = grouped[d];
    const total = entries.reduce((s,e)=>s+e.seconds,0);
    const sets = [...new Set(entries.map(e=>e.set))].join(', ');
    rows2.push([`Day ${d}`, fmtDate(entries[0].date), fmtDuration(total), Math.round(total/3600*100)/100, sets]);
  });
  const ws2 = XLSX.utils.aoa_to_sheet(rows2);
  ws2['!cols'] = [{wch:8},{wch:24},{wch:18},{wch:12},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Daily Summary');

  XLSX.writeFile(wb, `aligner-log-${nowDateStr()}.xlsx`);
}

// ─── Group log ────────────────────────────────────────────────────────────────
function groupByDay() {
  const g = {};
  state.log.forEach(e => {
    if (!g[e.dayNum]) g[e.dayNum] = [];
    g[e.dayNum].push(e);
  });
  return g;
}

// ─── Delete entry ─────────────────────────────────────────────────────────────
function deleteEntry(idx) {
  state.log.splice(idx, 1);
  save();
  renderLog();
}

// ─── UI update ────────────────────────────────────────────────────────────────
function updateUI() {
  const { isRunning, isPaused, elapsed, currentDay } = state;

  // Ring arc
  const arc = document.getElementById('ring-arc');
  const progress = Math.min(elapsed / (24 * 3600), 1);
  arc.style.strokeDashoffset = CIRC * (1 - progress);
  const color = isRunning && !isPaused ? '#3ECFB2' : isPaused ? '#F5A623' : '#2A3F5F';
  arc.style.stroke = color;

  // Day label in ring
  const ringDay = document.getElementById('ring-day');
  if (currentDay > 0) { ringDay.textContent = `Day ${currentDay}`; ringDay.style.display = ''; }
  else ringDay.style.display = 'none';

  // Time
  document.getElementById('ring-time').textContent = fmtDuration(elapsed);
  document.getElementById('ring-time').style.color = color;

  // Status
  const statusEl = document.getElementById('ring-status');
  statusEl.textContent = isRunning && !isPaused ? '● Wearing' : isPaused ? '⏸ Paused' : currentDay > 0 ? 'Ready' : 'Ready';
  statusEl.style.color = isRunning && !isPaused ? '#3ECFB2' : isPaused ? '#F5A623' : 'var(--dim)';

  // Next day hint
  const hint = document.getElementById('next-day-hint');
  if (!isRunning && currentDay > 0) {
    hint.style.display = '';
    document.getElementById('next-day-num').textContent = currentDay + 1;
  } else {
    hint.style.display = 'none';
  }

  // Buttons
  const btnStart = document.getElementById('btn-start');
  const btnPause = document.getElementById('btn-pause');
  const btnStop  = document.getElementById('btn-stop');

  if (isPaused) {
    btnStart.textContent = 'Resume'; btnStart.disabled = false;
    btnStart.onclick = handleResume;
  } else {
    btnStart.textContent = 'Start'; btnStart.disabled = isRunning;
    btnStart.onclick = handleStart;
  }
  btnPause.disabled = !isRunning || isPaused;
  btnStop.disabled  = !isRunning;

  // Start hint
  document.getElementById('hint-start').textContent = isPaused ? 'continue day' : 'new day';

  // Set display
  updateSetDisplay();

  renderLog();
}

function renderLog() {
  const container = document.getElementById('log-container');
  const exportBtn = document.getElementById('export-btn');

  if (state.log.length === 0) {
    container.innerHTML = '<div class="empty">No sessions recorded yet.<br>Press Start to begin Day 1!</div>';
    exportBtn.style.display = 'none';
    return;
  }
  exportBtn.style.display = 'flex';

  const grouped = groupByDay();
  const days = Object.keys(grouped).map(Number).sort((a,b)=>a-b);

  let html = '<table><thead><tr><th>Start</th><th>End</th><th>Duration</th><th>Set</th><th></th></tr></thead><tbody>';

  days.forEach(dayNum => {
    const entries = grouped[dayNum];
    const totalSecs = entries.reduce((s,e)=>s+e.seconds, 0);
    const isActive = state.isRunning && state.currentDay === dayNum;
    const pillClass = isActive ? 'day-pill active' : 'day-pill';
    const dot = isActive ? ' ●' : '';

    html += `<tr class="day-header"><td colspan="5">
      <span class="${pillClass}">Day ${dayNum}${dot}</span>
      📅 ${fmtDate(entries[0].date)}
      <button class="edit-day-btn" onclick="openEditDay(${dayNum})" title="Edit day">✏️</button>
    </td></tr>`;

    entries.forEach((entry, localIdx) => {
      const globalIdx = state.log.findIndex(
        e => e.dayNum === entry.dayNum && e.startTime === entry.startTime && e.endTime === entry.endTime && e.seconds === entry.seconds
      );
      html += `<tr>
        <td>${entry.startTime}</td>
        <td>${entry.endTime}</td>
        <td class="td-mono">${fmtDuration(entry.seconds)}</td>
        <td class="td-set">${entry.set}</td>
        <td><button class="del-btn" onclick="deleteEntry(${globalIdx})">✕</button></td>
      </tr>`;
    });

    html += `<tr class="total-row">
      <td colspan="2" class="total-label">Day ${dayNum} total</td>
      <td colspan="3">${fmtDuration(totalSecs)}<span class="total-hrs">(${Math.round(totalSecs/3600*10)/10}h)</span></td>
    </tr>`;
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

// ─── PWA install prompt ───────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('install-banner');
  if (!localStorage.getItem('install_dismissed')) banner.classList.add('show');
});
document.getElementById('install-btn').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').classList.remove('show');
};
document.getElementById('dismiss-btn').onclick = () => {
  document.getElementById('install-banner').classList.remove('show');
  localStorage.setItem('install_dismissed', '1');
};

// ─── Service Worker registration ─────────────────────────────────────────────
const SW_CODE = `
const CACHE = 'aligner-v1';
const ASSETS = [location.pathname];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting()));
});
self.addEventListener('activate', e => {
  e.waitUntil(clients.claim());
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
});
`;
if ('serviceWorker' in navigator) {
  const blob = new Blob([SW_CODE], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, { scope: '/' }).catch(() => {});
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
load();
if (state.isRunning && !state.isPaused) startTick();
updateUI();
</script>
</body>
</html>
